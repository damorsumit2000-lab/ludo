<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LUDO</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23111'/%3E%3Crect x='2' y='2' width='28' height='28' rx='4' fill='%23e53935'/%3E%3Crect x='34' y='2' width='28' height='28' rx='4' fill='%2343a047'/%3E%3Crect x='2' y='34' width='28' height='28' rx='4' fill='%231e88e5'/%3E%3Crect x='34' y='34' width='28' height='28' rx='4' fill='%23fdd835'/%3E%3Ccircle cx='32' cy='32' r='9' fill='white'/%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
html,body{height:100%;overflow-x:hidden}
:root{
  --R:#e53935;--G:#43a047;--B:#1e88e5;--Y:#fdd835;
  --RL:#ffcdd2;--GL:#c8e6c9;--BL:#bbdefb;--YL:#fff9c4;
  --tr:.3s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{--bg:#111318;--bg2:#1a1d24;--sf:#1e2128;--sf2:#252830;--bd:#2e3240;--tx:#f0eee8;--tx2:#8a8fa8;--sh:rgba(0,0,0,.7);--bb:#2a2d3a}
[data-theme="light"]{--bg:#f5f0e8;--bg2:#ebe6dc;--sf:#fff;--sf2:#f7f3ec;--bd:#ddd8cc;--tx:#1a1612;--tx2:#706860;--sh:rgba(0,0,0,.18);--bb:#c8c0b0}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;display:flex;flex-direction:column;min-height:100vh;transition:background var(--tr),color var(--tr)}
/* TOPBAR */
#topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border-bottom:1px solid var(--bd);transition:background var(--tr),border-color var(--tr)}
.t-logo{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--R),var(--Y),var(--G),var(--B));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.t-right{display:flex;gap:8px}
.ibtn{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s}
.ibtn:hover{border-color:var(--tx);transform:scale(1.06)}
/* SCREENS */
.scr{display:none;flex-direction:column;align-items:center;flex:1}
.scr.on{display:flex}
/* SETUP */
#setup{justify-content:center;padding:20px 14px;gap:18px;min-height:calc(100vh - 55px)}
.hero{text-align:center;animation:fup .7s cubic-bezier(.16,1,.3,1) both}
.hero h1{font-family:'Baloo 2',cursive;font-size:clamp(3rem,10vw,5.5rem);font-weight:800;letter-spacing:4px;line-height:1;background:linear-gradient(135deg,var(--R) 0%,var(--Y) 33%,var(--G) 66%,var(--B) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:12px;color:var(--tx2);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.sbox{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:18px;width:100%;max-width:430px;animation:fup .7s .1s cubic-bezier(.16,1,.3,1) both;transition:background var(--tr),border-color var(--tr)}
.slbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.pr{display:flex;gap:7px;margin-bottom:14px}
.pill{flex:1;padding:9px;text-align:center;background:var(--sf2);border:1.5px solid var(--bd);border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--tx2);cursor:pointer;transition:all .2s}
.pill:hover{border-color:var(--tx);color:var(--tx)}
.pill.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.prows{display:flex;flex-direction:column;gap:7px}
.prow{display:grid;grid-template-columns:14px 1fr auto;align-items:center;gap:10px;padding:8px 12px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;animation:sli .3s ease both}
@keyframes sli{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.pdot{width:10px;height:10px;border-radius:50%}
.pinp{background:transparent;border:none;outline:none;color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;width:100%}
.pinp::placeholder{color:var(--tx2);font-weight:600}
.tpills{display:flex;gap:4px}
.tpill{padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:1px;background:transparent;border:1.5px solid var(--bd);border-radius:50px;color:var(--tx2);cursor:pointer;transition:all .15s}
.tpill.on{background:var(--bd);color:var(--tx);border-color:transparent}
.sbtn{width:100%;max-width:430px;padding:15px;background:linear-gradient(135deg,var(--R),#e91e63);color:#fff;border:none;border-radius:14px;font-family:'Baloo 2',cursive;font-size:20px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 8px 24px rgba(229,57,53,.4);animation:fup .7s .2s cubic-bezier(.16,1,.3,1) both}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(229,57,53,.5)}
.sbtn:active{transform:translateY(0)}
@keyframes fup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
/* GAME */
#game{padding:0;flex-direction:column;align-items:stretch;min-height:calc(100vh - 55px)}
.gtop{display:flex;align-items:center;justify-content:center;padding:6px 12px;flex-shrink:0}
#sbar{font-size:13px;font-weight:700;color:var(--tx);text-align:center;min-height:20px}
.gmain{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 6px 0;gap:8px;overflow-y:auto}
/* Player cards */
.pcards{display:flex;gap:5px;width:100%;max-width:600px;flex-wrap:wrap;justify-content:center}
.pcard{flex:1;min-width:82px;background:var(--sf);border:2px solid var(--bd);border-radius:10px;padding:7px 9px;transition:all .3s;opacity:.5;position:relative;overflow:hidden}
.pcard::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .3s}
.pcard.ac{opacity:1;border-color:var(--aclr,#fff);transform:translateY(-2px);box-shadow:0 6px 18px var(--sh)}
.pcard.ac::after{background:var(--aclr,#fff)}
.pcard.wn{opacity:1;border-color:gold}
.pch{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.pcdot{width:8px;height:8px;border-radius:50%}
.pcnm{font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcai{font-size:9px;letter-spacing:1px;color:var(--tx2);background:var(--sf2);padding:1px 6px;border-radius:50px}
.pctoks{display:flex;gap:3px}
.ptk{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:rgba(255,255,255,.9);transition:all .3s}
.ptk.hm{opacity:.2}.ptk.dn{border-color:gold;box-shadow:0 0 5px gold}
/* BOARD */
#bwrap{position:relative;width:min(450px,calc(100vw - 12px));height:min(450px,calc(100vw - 12px));flex-shrink:0}
#board{width:100%;height:100%;display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);border-radius:10px;overflow:hidden;border:3px solid var(--bb);box-shadow:0 16px 48px var(--sh);background:#fff;transition:border-color var(--tr)}
.c{position:relative;display:flex;align-items:center;justify-content:center;border:.5px solid rgba(0,0,0,.1);overflow:visible}
.hR{background:var(--R)}.hG{background:var(--G)}.hB{background:var(--B)}.hY{background:var(--Y)}
.path{background:#fff}
.cR{background:var(--R)}.cG{background:var(--G)}.cB{background:var(--B)}.cY{background:var(--Y)}
.hsR{background:var(--RL)}.hsG{background:var(--GL)}.hsB{background:var(--BL)}.hsY{background:var(--YL)}
.safe::before{content:'☆';position:absolute;font-size:9px;color:rgba(0,0,0,.22);z-index:1;pointer-events:none}
/* TOKENS */
.tok{position:absolute;width:54%;height:54%;border-radius:50%;z-index:20;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:rgba(255,255,255,.95);will-change:transform;transition:transform .12s,box-shadow .12s;border:2px solid rgba(255,255,255,.45)}
.tok::before{content:'';position:absolute;top:10%;left:17%;width:38%;height:28%;background:rgba(255,255,255,.42);border-radius:50%;pointer-events:none}
.tok.red{background:radial-gradient(circle at 36% 32%,#ff6b6b,#c62828);box-shadow:0 3px 10px rgba(198,40,40,.6),inset 0 -2px 0 rgba(0,0,0,.25)}
.tok.green{background:radial-gradient(circle at 36% 32%,#66bb6a,#1b5e20);box-shadow:0 3px 10px rgba(27,94,32,.6),inset 0 -2px 0 rgba(0,0,0,.25)}
.tok.blue{background:radial-gradient(circle at 36% 32%,#64b5f6,#0d47a1);box-shadow:0 3px 10px rgba(13,71,161,.6),inset 0 -2px 0 rgba(0,0,0,.25)}
.tok.yellow{background:radial-gradient(circle at 36% 32%,#fff176,#f57f17);box-shadow:0 3px 10px rgba(245,127,23,.6),inset 0 -2px 0 rgba(0,0,0,.25)}
.tok:hover:not(.sel){transform:scale(1.1) translateY(-2px)}
.tok.sel{animation:tpulse .7s ease infinite alternate;cursor:pointer}
@keyframes tpulse{from{transform:scale(1);box-shadow:0 3px 10px rgba(255,255,255,.2)}to{transform:scale(1.28) translateY(-4px);box-shadow:0 9px 26px rgba(255,255,255,.85)}}
.tok.am{animation:tbounce .42s cubic-bezier(.16,1,.3,1) both;z-index:30}
@keyframes tbounce{0%{transform:scale(1) translateY(0)}30%{transform:scale(1.45) translateY(-11px)}62%{transform:scale(1.1) translateY(-3px)}82%{transform:scale(.96) translateY(0)}100%{transform:scale(1) translateY(0)}}
.tok.ae{animation:tenter .55s cubic-bezier(.16,1,.3,1) both}
@keyframes tenter{0%{transform:scale(0) rotate(-200deg);opacity:0}60%{transform:scale(1.3) rotate(15deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.tok.ac2{animation:tcap .5s ease both}
@keyframes tcap{0%{transform:scale(1);filter:brightness(1)}35%{transform:scale(1.6);filter:brightness(2) saturate(3)}70%{transform:scale(.6) translateY(4px);opacity:.4}100%{transform:scale(1);opacity:1}}
.tok.aw{animation:twin .75s cubic-bezier(.16,1,.3,1) both}
@keyframes twin{0%{transform:scale(1)}30%{transform:scale(1.9) rotate(22deg);filter:brightness(1.8)}62%{transform:scale(.88) rotate(-11deg)}100%{transform:scale(1) rotate(0)}}
/* FIXED DICE */
#dpanel{position:sticky;bottom:0;z-index:60;background:var(--sf);border-top:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:16px;flex-shrink:0;box-shadow:0 -8px 24px var(--sh);transition:background var(--tr),border-color var(--tr)}
#d3w{perspective:500px}
#dice{width:72px;height:72px;background:var(--sf2);border:2px solid var(--bd);border-radius:14px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:8px;gap:4px;cursor:pointer;user-select:none;transition:border-color .2s,background var(--tr);box-shadow:0 6px 20px var(--sh),inset 0 1px 0 rgba(255,255,255,.08),0 2px 0 rgba(0,0,0,.4);position:relative}
#dice::before{content:'';position:absolute;inset:0;border-radius:12px;background:linear-gradient(145deg,rgba(255,255,255,.09),transparent 55%);pointer-events:none}
#dice:hover:not(.dis){border-color:var(--tx);transform:translateY(-2px) scale(1.04)}
#dice:active:not(.dis){transform:scale(.97)}
#dice.roll{animation:droll .6s cubic-bezier(.36,.07,.19,.97) both;pointer-events:none}
@keyframes droll{0%{transform:rotateX(0) rotateY(0) rotateZ(0) scale(1)}15%{transform:rotateX(200deg) rotateY(80deg) rotateZ(40deg) scale(1.22)}35%{transform:rotateX(80deg) rotateY(260deg) rotateZ(140deg) scale(.83)}55%{transform:rotateX(280deg) rotateY(160deg) rotateZ(260deg) scale(1.17)}75%{transform:rotateX(380deg) rotateY(380deg) rotateZ(360deg) scale(.91)}100%{transform:rotateX(540deg) rotateY(540deg) rotateZ(540deg) scale(1)}}
#dice.dis{opacity:.3;pointer-events:none}
.dd{width:100%;aspect-ratio:1;border-radius:50%;background:var(--tx);transition:background var(--tr),opacity .15s}
.dd.off{opacity:0}
#dnum{font-family:'Baloo 2',cursive;font-size:40px;font-weight:800;color:var(--tx);min-width:50px;text-align:center;opacity:0;transform:scale(.5) translateY(8px);transition:all .35s cubic-bezier(.16,1,.3,1)}
#dnum.vis{opacity:1;transform:scale(1) translateY(0)}
#dnum.pop{animation:npop .5s cubic-bezier(.16,1,.3,1)}
@keyframes npop{0%{transform:scale(.3) translateY(14px);opacity:0}55%{transform:scale(1.42) translateY(-5px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
#skipbtn{display:none;padding:9px 18px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--tx2);cursor:pointer;transition:all .15s}
#skipbtn.vis{display:block}
#skipbtn:hover{border-color:var(--tx);color:var(--tx);transform:translateY(-1px)}
/* Ripple */
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:ripout .65s ease;pointer-events:none;z-index:15;width:50%;height:50%;left:25%;top:25%}
@keyframes ripout{to{transform:scale(5);opacity:0}}
/* Confetti */
.cf{position:fixed;pointer-events:none;z-index:999;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1}100%{transform:translateY(110vh) rotate(760deg) scale(.8);opacity:0}}
/* Win overlay */
#wo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);align-items:center;justify-content:center;z-index:500}
#wo.on{display:flex;animation:fin .4s ease both}
@keyframes fin{from{opacity:0}to{opacity:1}}
.wbox{background:var(--sf);border:1px solid var(--bd);border-radius:22px;padding:40px 48px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;max-width:320px;width:90%;animation:win .65s cubic-bezier(.16,1,.3,1) both}
@keyframes win{from{transform:scale(.75) translateY(28px);opacity:0}to{transform:scale(1);opacity:1}}
.wt{font-size:56px;animation:tsp .8s .3s cubic-bezier(.16,1,.3,1) both}
@keyframes tsp{from{transform:scale(0) rotate(-180deg)}to{transform:scale(1) rotate(0)}}
.wh{font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;letter-spacing:-1px}
.ws{font-size:13px;color:var(--tx2)}
.wbtns{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.wb{padding:12px 22px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.wb.p{background:linear-gradient(135deg,var(--R),#e91e63);color:#fff;border:none;box-shadow:0 6px 16px rgba(229,57,53,.4)}
.wb.s{background:transparent;border:1.5px solid var(--bd);color:var(--tx2)}
.wb:hover{transform:translateY(-2px);opacity:.9}
/* Toast */
#toast{position:fixed;bottom:102px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--sf);border:1.5px solid var(--bd);color:var(--tx);padding:10px 22px;border-radius:50px;font-size:13px;font-weight:700;z-index:400;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px var(--sh);transition:transform .35s cubic-bezier(.16,1,.3,1)}
#toast.on{transform:translateX(-50%) translateY(0)}
@media(max-width:380px){.wbox{padding:28px 20px}.wh{font-size:26px}}
@media(min-width:700px){#bwrap{width:min(520px,calc(100vw - 32px));height:min(520px,calc(100vw - 32px))}}
@media(min-width:960px){
  .gmain{flex-direction:row;align-items:flex-start;justify-content:center;padding:16px;gap:16px}
  .pcards{flex-direction:column;width:170px;flex-wrap:nowrap}
  #game{padding-bottom:96px}
  #dpanel{position:fixed;bottom:0;left:0;right:0}
  #bwrap{width:min(560px,58vw);height:min(560px,58vw)}
}
</style>
</head>
<body>
<div id="topbar">
  <div class="t-logo">LUDO</div>
  <div class="t-right">
    <div class="ibtn" id="thbtn" onclick="toggleTheme()">🌙</div>
    <div class="ibtn" onclick="goHome()">🏠</div>
  </div>
</div>

<div class="scr on" id="setup">
  <div class="hero"><h1>LUDO</h1><p>Classic Board Game</p></div>
  <div class="sbox">
    <div class="slbl">Number of Players</div>
    <div class="pr">
      <button class="pill" data-n="2" onclick="setN(2)">2 Players</button>
      <button class="pill on" data-n="4" onclick="setN(4)">4 Players</button>
    </div>
    <div class="slbl">AI Speed</div>
    <div class="pr">
      <button class="pill on" data-sp="normal" onclick="setSp('normal')">Normal</button>
      <button class="pill" data-sp="fast" onclick="setSp('fast')">Fast</button>
    </div>
    <div class="slbl">Players</div>
    <div class="prows" id="prows"></div>
  </div>
  <button class="sbtn" onclick="startGame()">🎲 Start Game</button>
</div>

<div class="scr" id="game">
  <div class="gtop"><div id="sbar">Roll the dice!</div></div>
  <div class="gmain">
    <div class="pcards" id="pcards"></div>
    <div id="bwrap"><div id="board"></div></div>
  </div>
  <div id="dpanel">
    <button id="skipbtn" onclick="skipTurn()">Skip</button>
    <div id="d3w"><div id="dice" onclick="humanRoll()">
      <div class="dd off"></div><div class="dd off"></div><div class="dd off"></div>
      <div class="dd off"></div><div class="dd off"></div><div class="dd off"></div>
      <div class="dd off"></div><div class="dd off"></div><div class="dd off"></div>
    </div></div>
    <div id="dnum">–</div>
  </div>
</div>

<div id="wo">
  <div class="wbox">
    <div class="wt">🏆</div>
    <div class="wh" id="wh">Wins!</div>
    <div class="ws" id="ws">Congratulations!</div>
    <div class="wbtns">
      <button class="wb p" onclick="startGame()">Play Again</button>
      <button class="wb s" onclick="goHome()">Menu</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const COLS=['red','green','blue','yellow'];
const CNAMES={red:'Red',green:'Green',blue:'Blue',yellow:'Yellow'};
const CHEX={red:'#e53935',green:'#43a047',blue:'#1e88e5',yellow:'#fdd835'};
const DDOTS={1:[[1,1]],2:[[0,0],[2,2]],3:[[0,0],[1,1],[2,2]],4:[[0,0],[0,2],[2,0],[2,2]],5:[[0,0],[0,2],[1,1],[2,0],[2,2]],6:[[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]]};
const SAFE=new Set(['6-1','1-8','8-13','13-6','0-7','7-14','14-7','7-0','2-6','6-12','12-8','8-2']);
const HBASES={red:[[1,1],[1,4],[4,1],[4,4]],green:[[1,9],[1,12],[4,9],[4,12]],blue:[[9,9],[9,12],[12,9],[12,12]],yellow:[[9,1],[9,4],[12,1],[12,4]]};

function buildPaths(){
  const outer=[[6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],[0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],[7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],[14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],[7,0],[6,0]];
  const hs={red:[[6,7],[5,7],[4,7],[3,7],[2,7],[1,7]],green:[[7,8],[7,9],[7,10],[7,11],[7,12],[7,13]],blue:[[8,7],[9,7],[10,7],[11,7],[12,7],[13,7]],yellow:[[7,6],[7,5],[7,4],[7,3],[7,2],[7,1]]};
  const offs={red:0,green:13,blue:26,yellow:39};
  const p={};
  COLS.forEach(c=>{const o=offs[c];p[c]=[...outer.slice(o),...outer.slice(0,o),...hs[c]];});
  return p;
}

let G={},sN=4,sSp='normal';
let sNames={red:'Red',green:'Green',blue:'Blue',yellow:'Yellow'};
let sTypes={red:'human',green:'ai',blue:'ai',yellow:'ai'};

function setN(n){sN=n;document.querySelectorAll('.pill[data-n]').forEach(b=>b.classList.toggle('on',+b.dataset.n===n));renderRows();}
function setSp(s){sSp=s;document.querySelectorAll('.pill[data-sp]').forEach(b=>b.classList.toggle('on',b.dataset.sp===s));}
function setType(c,t){sTypes[c]=t;renderRows();}
function renderRows(){
  const cols=sN===2?['red','blue']:COLS;
  document.getElementById('prows').innerHTML=cols.map((c,i)=>`
    <div class="prow" style="animation-delay:${i*.06}s">
      <div class="pdot" style="background:${CHEX[c]};box-shadow:0 0 6px ${CHEX[c]}"></div>
      <input class="pinp" id="ni-${c}" type="text" placeholder="${CNAMES[c]}"
        value="${sNames[c]!==CNAMES[c]?sNames[c]:''}" maxlength="10"
        oninput="sNames['${c}']=this.value||'${CNAMES[c]}'">
      <div class="tpills">
        <button class="tpill ${sTypes[c]==='human'?'on':''}" onclick="setType('${c}','human')">YOU</button>
        <button class="tpill ${sTypes[c]==='ai'?'on':''}" onclick="setType('${c}','ai')">AI</button>
      </div>
    </div>`).join('');
}

function startGame(){
  const cols=sN===2?['red','blue']:COLS;
  G={players:cols,types:Object.fromEntries(cols.map(c=>[c,sTypes[c]])),names:Object.fromEntries(cols.map(c=>[c,sNames[c]||CNAMES[c]])),tokens:Object.fromEntries(cols.map(c=>[c,[0,1,2,3].map(i=>({id:i,pi:-1}))])),paths:buildPaths(),ci:0,dv:0,phase:'roll',finished:new Set(),rank:[],sp:sSp};
  showScr('game');buildBoard();renderCards();renderTokens();drawDice(6);updateStatus();
  document.getElementById('wo').classList.remove('on');
  document.getElementById('dnum').classList.remove('vis','pop');
  document.getElementById('dnum').textContent='–';
  if(isAI())setTimeout(aiTurn,800);
}
function goHome(){document.getElementById('wo').classList.remove('on');showScr('setup');}
function showScr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

// BOARD
function buildBoard(){
  const b=document.getElementById('board');b.innerHTML='';
  // Remove old home boxes
  document.querySelectorAll('.hbox').forEach(e=>e.remove());
  for(let r=0;r<15;r++)for(let c=0;c<15;c++){
    const el=document.createElement('div');el.className='c';el.id=`B${r}_${c}`;
    styleCell(el,r,c);b.appendChild(el);
  }
  setTimeout(drawHomeBoxes,0);
}

function styleCell(el,r,c){
  // Home quadrants
  if(r<=5&&c<=5){el.classList.add('hR');return;}
  if(r<=5&&c>=9){el.classList.add('hG');return;}
  if(r>=9&&c>=9){el.classList.add('hB');return;}
  if(r>=9&&c<=5){el.classList.add('hY');return;}
  // Center 3x3
  if(r>=6&&r<=8&&c>=6&&c<=8){styleCenter(el,r,c);return;}
  // Home stretches
  if(c===7&&r>=1&&r<=5){el.classList.add('hsR');return;}
  if(r===7&&c>=9&&c<=13){el.classList.add('hsG');return;}
  if(c===7&&r>=9&&r<=13){el.classList.add('hsB');return;}
  if(r===7&&c>=1&&c<=5){el.classList.add('hsY');return;}
  // Start cells
  const k=`${r}-${c}`;
  if(k==='6-1'){el.classList.add('cR');}
  else if(k==='1-8'){el.classList.add('cG');}
  else if(k==='8-13'){el.classList.add('cB');}
  else if(k==='13-6'){el.classList.add('cY');}
  else{el.classList.add('path');}
  if(SAFE.has(k))el.classList.add('safe');
}

function styleCenter(el,r,c){
  el.style.background='#fff';el.style.overflow='hidden';
  if(r===7&&c===7){
    el.innerHTML=`<svg width="100%" height="100%" viewBox="0 0 60 60" style="position:absolute;inset:0"><polygon points="30,30 0,0 60,0" fill="#e53935"/><polygon points="30,30 60,0 60,60" fill="#43a047"/><polygon points="30,30 60,60 0,60" fill="#1e88e5"/><polygon points="30,30 0,60 0,0" fill="#fdd835"/><circle cx="30" cy="30" r="12" fill="white"/><text x="30" y="34" text-anchor="middle" font-size="10" font-weight="800" fill="#666" font-family="sans-serif">★</text></svg>`;
    return;
  }
  const maps={'6-6':'','6-7':'#e53935','6-8':'','7-6':'#fdd835','7-8':'#43a047','8-6':'','8-7':'#1e88e5','8-8':''};
  const k=`${r}-${c}`,clr=maps[k];
  if(clr){
    // Triangle pointing inward
    const dirs={'6-7':'polygon(0 0,100% 0,50% 100%)','7-8':'polygon(100% 0,100% 100%,0 50%)','8-7':'polygon(0 100%,100% 100%,50% 0)','7-6':'polygon(0 0,0 100%,100% 50%)'};
    el.innerHTML=`<div style="position:absolute;inset:0;background:${clr};clip-path:${dirs[k]||'none'}"></div>`;
  }
}

function drawHomeBoxes(){
  const bw=document.getElementById('board');
  const sz=bw.offsetWidth/15;
  const defs=[{c:'red',r1:1,c1:1},{c:'green',r1:1,c1:9},{c:'blue',r1:9,c1:9},{c:'yellow',r1:9,c1:1}];
  const wrap=document.getElementById('bwrap');
  defs.forEach(({c,r1,c1})=>{
    const div=document.createElement('div');
    div.className='hbox';div.id=`hb-${c}`;
    const pad=sz*.12,gap=sz*.08;
    div.style.cssText=`position:absolute;left:${c1*sz+sz*.08}px;top:${r1*sz+sz*.08}px;width:${4*sz-sz*.16}px;height:${4*sz-sz*.16}px;background:white;border-radius:${sz*.28}px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;padding:${pad}px;gap:${gap}px;pointer-events:none;z-index:2;`;
    for(let i=0;i<4;i++){
      const sl=document.createElement('div');
      sl.id=`sl-${c}-${i}`;
      sl.style.cssText=`border-radius:50%;background:${CHEX[c]}22;border:2px solid ${CHEX[c]}55;display:flex;align-items:center;justify-content:center;position:relative;`;
      div.appendChild(sl);
    }
    wrap.appendChild(div);
  });
}

function reposBoxes(){
  const bw=document.getElementById('board');if(!bw)return;
  const sz=bw.offsetWidth/15;
  [{c:'red',r1:1,c1:1},{c:'green',r1:1,c1:9},{c:'blue',r1:9,c1:9},{c:'yellow',r1:9,c1:1}].forEach(({c,r1,c1})=>{
    const div=document.getElementById(`hb-${c}`);if(!div)return;
    const pad=sz*.12;
    div.style.left=`${c1*sz+sz*.08}px`;div.style.top=`${r1*sz+sz*.08}px`;
    div.style.width=`${4*sz-sz*.16}px`;div.style.height=`${4*sz-sz*.16}px`;
    div.style.borderRadius=`${sz*.28}px`;div.style.padding=`${pad}px`;div.style.gap=`${sz*.08}px`;
  });
}
window.addEventListener('resize',()=>{reposBoxes();renderTokens();});

// TOKENS
function renderTokens(){
  document.querySelectorAll('.tok').forEach(t=>t.remove());
  if(!G.players)return;
  G.players.forEach(color=>{
    G.tokens[color].forEach((tok,ti)=>{
      const el=document.createElement('div');
      el.className=`tok ${color}`;el.dataset.c=color;el.dataset.i=ti;
      el.textContent=ti+1;el.onclick=()=>selectToken(color,ti);
      if(tok.pi===-1){
        const sl=document.getElementById(`sl-${color}-${ti}`);
        if(sl){el.style.cssText='position:relative;width:70%;height:70%;left:15%;top:15%';sl.appendChild(el);}
      }else if(tok.pi>=57){
        const cell=document.getElementById('B7_7');
        if(cell){
          const n=cell.querySelectorAll('.tok').length;
          const o=[[8,8],[52,8],[8,52],[52,52]];const[ox,oy]=o[Math.min(n,3)];
          el.style.cssText=`width:36%;height:36%;left:${ox}%;top:${oy}%`;cell.appendChild(el);
        }
      }else{
        const[pr,pc]=G.paths[color][tok.pi];
        const cell=document.getElementById(`B${pr}_${pc}`);
        if(cell){
          const n=cell.querySelectorAll('.tok').length;
          const o=[[10,10],[50,10],[10,50],[50,50]];const[ox,oy]=o[Math.min(n,3)];
          const s=n>=2?'42%':'54%';
          el.style.cssText=`left:${ox}%;top:${oy}%;width:${s};height:${s}`;cell.appendChild(el);
        }
      }
    });
  });
}

function animTok(color,ti,cls){
  document.querySelectorAll(`.tok[data-c="${color}"][data-i="${ti}"]`).forEach(el=>{
    el.classList.remove('am','ae','ac2','aw');void el.offsetWidth;el.classList.add(cls);
    el.addEventListener('animationend',()=>el.classList.remove(cls),{once:true});
  });
}

// CARDS
function renderCards(){
  document.getElementById('pcards').innerHTML=G.players.map(c=>`
    <div class="pcard" id="pc-${c}" style="--aclr:${CHEX[c]}">
      <div class="pch">
        <div class="pcdot" style="background:${CHEX[c]};box-shadow:0 0 6px ${CHEX[c]}88"></div>
        <div class="pcnm">${G.names[c]}</div>
        <div class="pcai">${G.types[c]==='ai'?'AI':'YOU'}</div>
      </div>
      <div class="pctoks" id="pt-${c}"></div>
    </div>`).join('');
  updateCards();
}
function updateCards(){
  const cur=G.players[G.ci];
  G.players.forEach(c=>{
    const card=document.getElementById(`pc-${c}`);if(!card)return;
    card.classList.toggle('ac',c===cur&&!G.finished.has(c));
    card.classList.toggle('wn',G.finished.has(c));
    const ri=G.rank.indexOf(c);
    document.getElementById(`pt-${c}`).innerHTML=G.tokens[c].map((t,i)=>`<div class="ptk ${t.pi===-1?'hm':''} ${t.pi>=57?'dn':''}" style="background:${CHEX[c]}">${ri>=0&&t.pi>=57?'⭐':i+1}</div>`).join('');
  });
}

// DICE
function drawDice(n){
  const dots=document.getElementById('dice').querySelectorAll('.dd');
  const act=DDOTS[n]||[];
  dots.forEach((d,idx)=>{const r=Math.floor(idx/3),c=idx%3;d.classList.toggle('off',!act.some(([dr,dc])=>dr===r&&dc===c));});
}
function showDnum(n){
  const el=document.getElementById('dnum');
  el.textContent=n;el.classList.remove('vis','pop');void el.offsetWidth;el.classList.add('vis','pop');
}
function humanRoll(){if(G.phase!=='roll'||isAI())return;doRoll();}
function doRoll(cb){
  const dice=document.getElementById('dice');dice.classList.add('roll');
  let f=0;const iv=setInterval(()=>{drawDice(Math.ceil(Math.random()*6));if(++f>9)clearInterval(iv);},52);
  setTimeout(()=>{clearInterval(iv);dice.classList.remove('roll');G.dv=Math.ceil(Math.random()*6);drawDice(G.dv);showDnum(G.dv);if(cb)cb();else afterRoll();},600);
}

// LOGIC
function cur(){return G.players[G.ci];}
function isAI(){return G.types[cur()]==='ai';}
function movable(color,d){return G.tokens[color].reduce((a,t,i)=>{if(t.pi>=57)return a;if(t.pi===-1&&d!==6)return a;if(t.pi!==-1&&t.pi+d>57)return a;a.push(i);return a;},[]);}

function afterRoll(){
  const c=cur(),mv=movable(c,G.dv);
  if(!mv.length){updateStatus(`${G.names[c]} — No moves!`);setTimeout(nextTurn,1100);return;}
  G.phase='move';updateStatus(`${G.names[c]} — Tap a token`);
  if(isAI()){setTimeout(()=>aiMove(c,mv),G.sp==='fast'?280:760);return;}
  mv.forEach(ti=>document.querySelectorAll(`.tok[data-c="${c}"][data-i="${ti}"]`).forEach(el=>el.classList.add('sel')));
  document.getElementById('skipbtn').classList.add('vis');
}

function selectToken(color,ti){
  if(G.phase!=='move'||color!==cur()||isAI())return;
  if(!movable(color,G.dv).includes(ti))return;
  clearSel();doMove(color,ti,G.dv);
}
function clearSel(){document.querySelectorAll('.tok.sel').forEach(el=>el.classList.remove('sel'));document.getElementById('skipbtn').classList.remove('vis');}

function doMove(color,ti,d){
  const tok=G.tokens[color][ti];const wasHome=tok.pi===-1;
  tok.pi=wasHome?0:tok.pi+d;
  const fin=tok.pi>=57;
  const[dr,dc]=fin?[7,7]:G.paths[color][tok.pi];
  const dcell=document.getElementById(`B${dr}_${dc}`);
  if(dcell){const rip=document.createElement('div');rip.className='rip';dcell.appendChild(rip);rip.addEventListener('animationend',()=>rip.remove());}
  renderTokens();
  requestAnimationFrame(()=>animTok(color,ti,wasHome?'ae':fin?'aw':'am'));
  if(fin){showToast(`${G.names[color]} token ${ti+1} finished! 🎉`);checkWin(color);}
  else checkCapture(color,ti);
  updateCards();G.phase='roll';
  const extra=d===6&&!fin;
  if(extra){updateStatus(`${G.names[color]} rolled 6 — Roll again!`);if(isAI())setTimeout(aiTurn,G.sp==='fast'?400:950);}
  else setTimeout(nextTurn,fin?900:180);
}

function checkCapture(ac,ati){
  const atk=G.tokens[ac][ati];if(atk.pi<0||atk.pi>=57)return;
  const[ar,aac]=G.paths[ac][atk.pi];if(SAFE.has(`${ar}-${aac}`))return;
  G.players.forEach(c=>{
    if(c===ac)return;
    G.tokens[c].forEach((t,ti)=>{
      if(t.pi<0||t.pi>=57)return;
      const[tr,tc]=G.paths[c][t.pi];
      if(tr===ar&&tc===aac){animTok(c,ti,'ac2');setTimeout(()=>{t.pi=-1;renderTokens();updateCards();},260);showToast(`${G.names[ac]} captured ${G.names[c]}! 💥`);}
    });
  });
}

function checkWin(color){
  if(!G.tokens[color].every(t=>t.pi>=57)||G.finished.has(color))return;
  G.finished.add(color);G.rank.push(color);updateCards();
  if(G.rank.length===1){
    setTimeout(()=>{
      launchConfetti();
      document.getElementById('wh').textContent=`${G.names[color]} Wins! 🎊`;
      document.getElementById('ws').textContent=G.types[color]==='ai'?'The AI claims victory!':'Well played!';
      document.getElementById('wo').classList.add('on');
    },850);
  }
}

function nextTurn(){
  G.phase='roll';let n=(G.ci+1)%G.players.length,t=0;
  while(G.finished.has(G.players[n])&&t++<G.players.length)n=(n+1)%G.players.length;
  G.ci=n;updateCards();updateStatus();
  if(isAI())setTimeout(aiTurn,G.sp==='fast'?280:700);
}
function skipTurn(){clearSel();nextTurn();}
function updateStatus(msg){
  const c=cur(),el=document.getElementById('sbar');
  if(msg){el.textContent=msg;return;}
  el.textContent=`${G.names[c]}${G.types[c]==='ai'?' (AI)':''} — ${G.phase==='roll'?'Roll the dice!':'Pick a token to move'}`;
}

// AI
function aiTurn(){if(G.phase!=='roll'||!isAI())return;doRoll(()=>afterRoll());}
function aiMove(color,mv){
  let ch=mv[0];
  for(const ti of mv){const t=G.tokens[color][ti];if(t.pi<0)continue;const ni=t.pi+G.dv;if(ni>=G.paths[color].length)continue;const[nr,nc]=G.paths[color][ni];for(const oc of G.players){if(oc===color)continue;for(const ot of G.tokens[oc]){if(ot.pi<0||ot.pi>=57)continue;const[tr,tc]=G.paths[oc][ot.pi];if(tr===nr&&tc===nc){ch=ti;doMove(color,ch,G.dv);return;}}}}
  for(const ti of mv){const t=G.tokens[color][ti];if(t.pi>=0&&t.pi+G.dv>=57){ch=ti;break;}}
  let mx=-2;for(const ti of mv){const t=G.tokens[color][ti];if(t.pi>mx){mx=t.pi;ch=ti;}}
  if(G.dv===6){const h=mv.find(ti=>G.tokens[color][ti].pi===-1);if(h!==undefined)ch=h;}
  doMove(color,ch,G.dv);
}

// EFFECTS
function launchConfetti(){
  const cs=['#e53935','#43a047','#1e88e5','#fdd835','#fff','#ff9f43','#a29bfe','#fd79a8','#00cec9'];
  for(let i=0;i<100;i++)setTimeout(()=>{const p=document.createElement('div');p.className='cf';const sz=6+Math.random()*9;p.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${sz}px;height:${sz}px;background:${cs[Math.floor(Math.random()*cs.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.4+Math.random()*2.2}s;`;document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());},i*16);
}
let tT;
function showToast(msg){clearTimeout(tT);const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');tT=setTimeout(()=>t.classList.remove('on'),2500);}

function toggleTheme(){const d=document.documentElement.dataset.theme==='dark';document.documentElement.dataset.theme=d?'light':'dark';document.getElementById('thbtn').textContent=d?'☀️':'🌙';}

renderRows();
</script>
</body>
</html>
